<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved To-Do</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/save-todo.css" />
</head>
<body>
  <header class="navbar">
       <div class="name">
        <a href="/index.html" class="story">
            <img src="/assets/book (1).png" class="book">
            <div class="logo">My Journal</div>
        </a>
    </div>

      <div class="features">
        <a href="./save-journal.html" class="story">My Journey</a>
        <a href="./journal.html" class="story">Story</a>
        <a href="./to-do-list.html" class="todo">Todo</a>
        <a href="./wish-list.html" class="wishe">Wishes</a>
        <a href="./profile.html" class="profile">Profile </a>
        <a href="./login.html" class="icon-btn logout"><i class="fa-solid fa-right-from-bracket"></i></a>
      </div>
    </header>

  <div class="container">

    <!-- Top Tabs -->
    <div class="tabs">
      <a href="./save-journal.html">Story</a>
      <p class="active">To-Do</p>
      <a href="./save.wish.html">Wishes</a>
      <a href="./to-do-list.html" class="new-task">+ New Task</a>
    </div>

    <!-- search -->
       <input type="search" placeholder="Search entries..."  class="search"/><i class="fa-solid fa-magnifying-glass" id="searchBtn"
   style="color: rgb(177, 151, 252); padding: 10px; cursor: pointer;"></i>

    <div id="demo"></div>
    <script>
      const container = document.getElementById("demo");

      fetch("http://127.0.0.1:8000/todos/user/1")
        .then((response) => response.json())
        .then((data) => {
          console.log(data);

          data.forEach((todo) => {
            const card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
              <h3>${todo.task}</h3>
              <p>${todo.date}</p>
              <p>${todo.time}</p>
              <button class="delete-btn" data-id="${todo.todo_id}">Delete</button>
              <span class="status ${todo.status === "Achieved" ? "achieved" : "pending"}">  ${todo.status} </span>
            `;

            container.appendChild(card);
          });
  document.getElementById("searchBtn").addEventListener("click", function () {
  let value = document.querySelector(".search").value.toLowerCase();
  let todos = document.querySelectorAll(".card");
  todos.forEach(function(todo){
    if (todo.textContent.toLowerCase().includes(value)) {
        todo.style.display = "block";
    }
    else{
        todo.style.display = "none";
    }
  });

});    
container.addEventListener("click", function(e){

  if(e.target.classList.contains("delete-btn")){

    const id = e.target.getAttribute("data-id");

    fetch(`http://127.0.0.1:8000/todos/${id}`, {
      method: "DELETE"
    })
    .then(res => {
      if(res.ok){
        e.target.closest(".card").remove();
      }
    })
    .catch(err => console.log(err));

  }

});      
        })
        .catch((error) => console.log(error));
    </script>

</body>
</html>

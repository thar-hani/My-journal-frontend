<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Journal</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/journal.css" />
  </head>

  <body>
    <header>
      <div class="name">
        <a href="/index.html" class="story">
            <img src="/assets/book (1).png" class="book">
            <div class="logo">My Journal</div>
        </a>
    </div>

       <div class="features">
        <a href="./save-journal.html" class="story">My Journey</a>
        <a href="./journal.html" class="story">Story</a>
        <a href="./to-do-list.html" class="todo">Todo</a>
        <a href="./wish-list.html" class="wishe">Wishes</a>
        <a href="./profile.html" class="profile">Profile </a>
        <a href="./login.html" class="icon-btn logout"><i class="fa-solid fa-right-from-bracket"></i></a>
      </div>

    </header>

    <div class="container">
      <aside class="sidebar">
        <div class="search-box">
          <h2>Search</h2>
          <input type="text" placeholder="Search entries..." />
        </div>

        <div class="filters">
          <h2><i class="fa-solid fa-filter"></i> Filters</h2>
          <div class="dropdowns">
            <select>
              <option>All Moods</option>
              <option>Happy</option>
              <option>Sad</option>
              <option>Excited</option>
              <option>Calm</option>
            </select>
          </div>
        </div>

        <div class="entries">
          <h3>Entries (2)</h3>
          <div class="entry">
            <div class="entry-title">Morning meditation</div>
            <div class="entry-date">22/09/2025 • 😃</div>
            <div class="entry-text">
              Started the day with a 10-minute meditation session.
            </div>
            <div class="tags">
              <div class="tag">Happy</div>
            </div>
          </div>

          <div class="entry yellow">
            <div class="entry-title">Coffee shop discovery</div>
            <div class="entry-date">19/09/2025 • 😃</div>
            <div class="entry-text">
              Found a new café with the perfect writing vibe.
            </div>
            <div class="tags">
              <div class="tag">Happy</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="date">
          <label>Date:</label>
          <input type="date" id="dateInput"/>
        </div>

        <div class="mood">
           <label>Mood:</label>
           <div class="emojis">
              <button class="emoji-btn">😃</button>
              <button class="emoji-btn">😔</button>
              <button class="emoji-btn">😡</button>
              <button class="emoji-btn">😶</button>
           </div>
        </div>

        <input type="text" id="titleInput" placeholder="Entry title..." class="title-input" />

        <div class="text-toolbar">
          <button class="tool-btn" id="bold-btn" title="Bold">
            <i class="fa-solid fa-bold"></i>
          </button>
          <button class="tool-btn" id="italic-btn" title="Italic">
            <i class="fa-solid fa-italic"></i>
          </button>
          <button class="tool-btn" id="underline-btn" title="Underline">
            <i class="fa-solid fa-underline"></i>
          </button>
          <button class="tool-btn" id="highlight-btn" title="Highlight">
            <i class="fa-solid fa-highlighter"></i>
          </button>
        </div>

        <textarea id="contentInput"  placeholder="What's on your mind today?"></textarea>

        <div class="filters">
          <select id="tagSelect">
            <option>All Tags</option>
            <option>Happy</option>
            <option>Sad</option>
            <option>Angry</option>
            <option>Neutral</option>
          </select>
        </div>

        <div class="buttons">
          <a class="cancel" href="../index.html">Cancel</a>
          <button class="save" id="saveBtn">Save Entry</button>
        </div>
      </main>
    </div>
<script>
function loadStories() {
    fetch("http://127.0.0.1:8000/stories/")
    .then(res => res.json())
    .then(data => {

        const container = document.querySelector(".entries");
        container.innerHTML = "<h3>Entries</h3>";

        data.forEach(story => {
    const entry = `
        <div class="entry">
            <div class="entry-title">${story.title}</div>
            <div class="entry-date">${story.date} • ${story.mood}</div>
            <div class="entry-text">${story.story}</div>
            <div class="tags">
                <div class="tag">${story.tags}</div>
            </div>
        </div>
    `;
    container.innerHTML += entry;
});
    });
}

// Load when page opens
loadStories();
let selectedMood = "";

// Select Emoji

document.querySelectorAll(".emoji-btn").forEach(button => {
    button.addEventListener("click", function() {
        selectedMood = this.textContent;

        // Optional: highlight selected emoji
        document.querySelectorAll(".emoji-btn").forEach(btn => {
            btn.style.transform = "scale(1)";
        });
        this.style.transform = "scale(1.3)";
    });
});


document.getElementById("saveBtn").addEventListener("click", function () {

    const date = document.getElementById("dateInput").value;
    const title = document.getElementById("titleInput").value;
    const content = document.getElementById("contentInput").value;
    const tag = document.getElementById("tagSelect").value;
    
    fetch("http://127.0.0.1:8000/stories/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
        user_id: 1,             
        date: date,
        title: title,
        story: content,          
        mood: selectedMood,
        tags: tag 
        })
    })
    .then(response => response.json())
    .then(data => {
    alert("Journal Saved Successfully!");
    loadStories();   // refresh entries
})
    .catch(error => {
        console.error("Error:", error);
    });

});

</script>

  </body>
</html>
